# Reads tofu outputs directly from the Azure Storage state blob.
# Avoids installing tofu or running init — just a blob download + jq parse (~5 seconds).
name: Read Tofu Outputs

on:
  workflow_call:
    inputs:
      storage_account:
        description: 'Azure Storage Account holding tfstate'
        required: true
        type: string
      state_key:
        description: 'Blob name (e.g., kill-me.tfstate)'
        required: true
        type: string
      storage_container:
        description: 'Blob container name'
        required: false
        type: string
        default: 'tfstate'
    outputs:
      outputs_json:
        description: 'JSON object of all tofu outputs (key → value)'
        value: ${{ jobs.read.outputs.outputs_json }}

permissions:
  id-token: write
  contents: read

jobs:
  read:
    name: Read Tofu State Outputs
    runs-on: ubuntu-latest
    outputs:
      outputs_json: ${{ steps.parse.outputs.outputs_json }}
    steps:
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Download state blob
        run: |
          az storage blob download \
            --account-name "${{ inputs.storage_account }}" \
            --container-name "${{ inputs.storage_container }}" \
            --name "${{ inputs.state_key }}" \
            --file state.json \
            --auth-mode login

      - name: Parse outputs
        id: parse
        run: |
          OUTPUTS=$(jq -c '[.outputs | to_entries[] | {(.key): .value.value}] | add // {}' state.json)
          echo "outputs_json=$OUTPUTS" >> $GITHUB_OUTPUT
